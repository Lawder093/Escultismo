<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Escultismo Crítico Popular</title>

<style>

/* ===== RESET ===== */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: system-ui, -apple-system, sans-serif;
}

body{
  height:200vh; /* solo para probar scroll */
}

/* ===== NAVBAR ===== */
header{
  position: sticky;
  top: 0;
  width: 100%;
  background: rgba(255,255,255,0.9);
  backdrop-filter: blur(10px);
  border-bottom: 1px solid #eaeaea;
  z-index: 1000;
}

.navbar{
  max-width: 1200px;
  margin: auto;
  padding: 14px 24px;
  display:flex;
  justify-content:center;
  align-items:center;
}

/* ===== MENU ===== */
.nav-menu{
  list-style:none;
  display:flex;
  gap:40px;
}

.nav-menu a{
  text-decoration:none;
  color:#222;
  font-weight:500;
  font-size:0.95rem;
  letter-spacing:0.4px;
  padding:8px 4px;
  position:relative;
  transition:color .25s ease;
}

/* Hover elegante */
.nav-menu a::after{
  content:"";
  position:absolute;
  left:0;
  bottom:-4px;
  width:0%;
  height:2px;
  background:#0066cc;
  transition:width .25s ease;
}

.nav-menu a:hover{
  color:#0066cc;
}

.nav-menu a:hover::after{
  width:100%;
}

</style>
</head>

<body>

<header>
  <nav class="navbar">
    <ul class="nav-menu">
      <li><a href="escultismo-critico.html">Escultismo Crítico</a></li>
      <li><a href="cde.html">CDE</a></li>
      <li><a href="voluntariado.html">Voluntariado</a></li>
      <li><a href="recursos.html">Recursos</a></li>
    </ul>
  </nav>

</header>
</body>
</html>
